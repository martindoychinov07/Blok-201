spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5433/project_db
spring.datasource.username=postgres
spring.datasource.password=postgres123!
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=server
server.port=8081

# AI core integration
ai.core.base-url=${AI_CORE_BASE_URL:http://localhost:8001}
ai.core.timeout-ms=${AI_CORE_TIMEOUT_MS:25000}
ai.default-patient-id=${AI_DEFAULT_PATIENT_ID:p_001}
ai.embedded-token=${EMBEDDED_INGEST_TOKEN:}
ai.webhook-token=${AI_WEBHOOK_TOKEN:}
ai.store.max-events=${AI_STORE_MAX_EVENTS:500}

# MQTT transport (SIM device -> server)
mqtt.broker-uri=${MQTT_BROKER_URI:tcp://localhost:1883}
mqtt.inbound-client-id=${MQTT_INBOUND_CLIENT_ID:spring-server-client}
mqtt.outbound-client-id=${MQTT_OUTBOUND_CLIENT_ID:spring-server-publisher}

# FTP bridge (optional): if set, server polls this folder for ack_<number>_*.wav files
ftp.inbox-dir=${FTP_INBOX_DIR:}
ftp.scan-ms=${FTP_SCAN_MS:1000}
